<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎬 Daily Motion Graphics Picks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="bg-video-wrapper" aria-hidden="true"></div>
  <div id="bg-overlay" aria-hidden="true"></div>

  <header class="site-header">
    <div class="header-inner">
      <h1>Daily Motion Graphics Picks</h1>
      <div class="header-right">
        <button id="bg-toggle" class="bg-toggle" title="背景動画 ON/OFF" aria-label="背景動画 ON/OFF">
          <span class="bg-toggle-icon">🎞️</span>
        </button>
        <div class="stats">
          <div><span id="stat-total">0</span>作品</div>
          <div><span id="stat-favorites">0</span>★ お気に入り</div>
          <div><span id="stat-days">0</span>日分</div>
        </div>
      </div>
    </div>
  </header>

  <section class="hero">
    <h2 class="hero-title">センスのいい映像・モーショングラフィックスを毎日ピックアップ</h2>
    <p class="hero-subtitle">国内外のYouTube・Vimeo・X・TikTok・Behance等から厳選した参考作品アーカイブ</p>
    <span class="hero-update">毎朝10時 自動更新</span>
  </section>

  <section class="filter-bar">
    <div class="search-row">
      <input type="search" id="search-input" placeholder="タイトル・制作者・タグで検索..." />
    </div>

    <div class="filter-section">
      <div class="filter-section-header">
        <span class="filter-section-title">エリアから探す</span>
      </div>
      <div class="chip-group" id="region-filter">
        <button class="chip active" data-region="all">すべて</button>
        <button class="chip" data-region="jp">🇯🇵 国内</button>
        <button class="chip" data-region="global">🌍 海外</button>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-section-header">
        <span class="filter-section-title">ジャンルから探す</span>
      </div>
      <div class="chip-group" id="genre-filter">
        <button class="chip active" data-genre="all">すべて</button>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-section-header">
        <span class="filter-section-title">技術・スタイルから探す</span>
      </div>
      <div class="chip-group" id="tech-filter">
        <button class="chip active" data-tech="all">すべて</button>
      </div>
    </div>

    <div class="filter-utility-row">
      <select id="date-filter">
        <option value="all">すべての日付</option>
      </select>
      <label class="toggle-label">
        <input type="checkbox" id="favorites-only" />
        <span>★ お気に入りのみ表示</span>
      </label>
      <button class="btn-reset" id="reset-filters">フィルタをリセット</button>
    </div>
  </section>

  <div class="result-count">
    <strong id="result-count-num">0</strong>件の作品
  </div>

  <main id="card-grid" class="card-grid">
    <!-- カード群が動的に挿入される -->
  </main>

  <div id="empty-state" class="empty-state" style="display:none;">
    <div class="empty-state-icon">🎬</div>
    <p>該当する作品がありません。</p>
    <p class="empty-hint">フィルタを変更するか、明朝10時のスケジュールタスクの実行をお待ちください。</p>
  </div>

  <div id="bg-now-playing" class="bg-now-playing" style="display:none;">
    <span class="bg-now-playing-label">▶ BG</span>
    <span id="bg-now-playing-title"></span>
  </div>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <p>毎朝10時に自動更新 · データは <code>data.js</code> に蓄積</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
